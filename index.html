    <script>
      // Emergency fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        var targets = [window, globalThis, window.constructor.prototype];
        targets.forEach(function(target) {
          if (!target) return;
          try {
            var descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
            if (descriptor && !descriptor.writable && descriptor.configurable) {
              console.log('Patching fetch descriptor on', target);
              var originalFetch = target.fetch;
              Object.defineProperty(target, 'fetch', {
                get: function() { return originalFetch; },
                set: function() { /* Silently ignore assignments */ },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {}
        });
      })();
    </script>

  </body>
