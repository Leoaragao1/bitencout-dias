    <script>
      // Emergency fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This is often caused by polyfills in environments where window.fetch is read-only.
      (function() {
        var originalFetch = window.fetch;
        if (originalFetch && Object.getOwnPropertyDescriptor(window, 'fetch') && !Object.getOwnPropertyDescriptor(window, 'fetch').writable) {
          console.log('Protecting window.fetch to avoid polyfill errors');
          var fetchGetter = function() { return originalFetch; };
          try {
            Object.defineProperty(window, 'fetch', {
              get: fetchGetter,
              set: function() { /* ignore assignment */ },
              configurable: true
            });
          } catch (e) {}
        }
      })();
    </script>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
